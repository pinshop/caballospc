<html lang="es">

<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            font-family: sans-serif;
        }

        .inputFields {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 0;
            background: rgba(0, 0, 0, 0.75);
            text-align: center;
            z-index: 20;
            color: white;
        }

        .inputFields input {
            padding: 6px 10px;
            font-size: 1em;
            margin: 2px;
        }

        #stateText {
            margin-top: 5px;
            font-size: 14px;
        }

        #zona {
            position: relative;
            margin: 80px auto 0;
            width: 450px;
            /* Formato más vertical inicial */
            height: 800px;
            /* Alto inicial */
            min-width: 300px;
            /* Ancho mínimo */
            min-height: 400px;
            /* Alto mínimo */
            max-width: 95vw;
            max-height: 85vh;
            resize: both;
            /* Permite redimensionar ancho y alto desde la esquina */

            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            z-index: 1;
        }

        body.mobile-mode {
            background: #000;
        }

        body.mobile-mode #zona {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            z-index: 9000;
        }

        body.mobile-mode .inputFields {
            display: none !important;
        }

        #exitMobileBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            font-size: 30px;
            font-weight: bold;
            border-radius: 50%;
            text-align: center;
            line-height: 50px;
            cursor: pointer;
            z-index: 10000;
            border: 2px solid white;
            box-shadow: 0 0 10px #000;
            font-family: sans-serif;
        }

        body.mobile-mode #exitMobileBtn {
            display: block;
        }

        /* COMENTARIOS */
        .comment {
            position: absolute;
            padding: 8px 14px;
            background: rgba(255, 255, 0, 0.85);
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            animation: fadeUp 3s forwards;
        }

        .comment img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }

            15% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-80px);
            }
        }

        /* LLUVIA GENERAL */
        .rosquilla-item,
        .quiereme-item,
        .avena-item,
        .agua-item,
        .celula-profile {
            position: absolute;
            pointer-events: none;
            user-select: none;
            animation: fall linear forwards;
            z-index: 10;
        }

        @keyframes fall {
            0% {
                transform: translateY(-150px) rotate(0deg);
            }

            100% {
                transform: translateY(calc(100vh + 150px)) rotate(1080deg);
            }
        }

        /* CÉLULAS */
        .celula-profile {
            border-radius: 50%;
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.4);
            animation: celulaFall linear forwards;
        }

        @keyframes celulaFall {
            0% {
                transform: translateY(-120px) rotate(0deg) scale(0.6);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(calc(100vh + 100px)) rotate(720deg) scale(1);
                opacity: 0.7;
            }
        }

        /* NOMBRE CENTRO */
        .gift-sender {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            font-weight: 900;
            color: #FF4500;
            text-shadow: 0 0 20px #fff, 0 0 40px #FF4500, 0 0 80px #FF4500;
            z-index: 15;
            pointer-events: none;
            animation: popName 4s forwards;
            white-space: nowrap;
        }

        @keyframes popName {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.2);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }

            75% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
        }

        /* TEXTOS ABAJO */
        .bottom-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 25;
            pointer-events: none;
            width: 90%;
        }

        .countdown-number {
            font-size: 4.2em;
            font-weight: 900;
            color: white;
            text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000;
            animation: pulse 1.5s infinite alternate;
        }

        .descanso-text {
            font-size: 1.9em;
            font-weight: 900;
            color: white;
            text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;
            margin-top: -8px;
        }

        .bottom-donor-name {
            font-size: 2.4em;
            font-weight: 900;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 28px;
            border-radius: 50px;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            margin: 6px auto;
            display: inline-block;
            animation: bottomFade 5s forwards;
        }

        @keyframes bottomFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            10% {
                opacity: 1;
                transform: translateY(0);
            }

            90% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-15px);
            }
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        /* === NUEVO EFECTO MEWING === */
        .mewing-gif {
            position: absolute;
            top: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            max-width: 80vw;
            pointer-events: none;
            z-index: 30;
            animation: mewingDrop 5.2s forwards;
            filter: drop-shadow(0 0 30px #ffffff) drop-shadow(0 0 70px #a020f0);
            border-radius: 20px;
        }

        @keyframes mewingDrop {
            0% {
                top: -300px;
                opacity: 0;
                transform: translateX(-50%) scale(0.6);
            }

            18% {
                top: 50%;
                opacity: 1;
                transform: translateX(-50%) translateY(-50%) scale(1.15);
            }

            22% {
                transform: translateX(-50%) translateY(-50%) scale(1);
            }

            75% {
                top: 50%;
                opacity: 1;
                transform: translateX(-50%) translateY(-50%) scale(1);
            }

            100% {
                top: 50%;
                opacity: 0;
                transform: translateX(-50%) translateY(-50%) scale(0.8);
            }
        }

        /* CARRERA DE CABALLOS */
        .race-container {
            position: absolute;
            top: 2%;
            left: 2%;
            width: 96%;
            height: 96%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 20;
            pointer-events: none;
        }

        .finish-line-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 25px;
            height: 100%;
            background-color: #fff;
            background-image:
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            z-index: 10;
            border-left: 2px solid #fff;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .track {
            position: relative;
            width: 100%;
            height: 5.2%;
            display: flex;
            align-items: center;
            pointer-events: auto;
        }

        .track::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.3) 50%, transparent 50%);
            background-size: 30px 2px;
            animation: moveDashes 0.5s linear infinite;
            z-index: 1;
        }

        @keyframes moveDashes {
            from {
                background-position: 0 0;
            }

            to {
                background-position: -30px 0;
            }
        }

        .start-line {
            display: flex;
            align-items: center;
            width: 10%;
            min-width: 80px;
            height: 100%;
            z-index: 10;
        }

        .start-line img.gift-icon {
            height: 70%;
            margin-right: 5px;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.5));
            object-fit: contain;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .start-line img.flag-img {
            height: 80%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .start-line .counter {
            color: white;
            font-size: 3vh;
            font-weight: 900;
            margin-left: 10px;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            min-width: 50px;
        }

        .horse-wrapper {
            position: absolute;
            left: 10%;
            height: 100%;
            display: flex;
            align-items: center;
            transition: left 0.3s ease-out;
            z-index: 5;
        }

        .horse-wrapper img.horse-gif {
            height: 160%;
            transform: translateY(-10%);
        }

        .horse-particle {
            position: absolute;
            z-index: 30;
            width: 6px;
            height: 6px;
            pointer-events: none;
            border-radius: 50%;
        }

        .track-name {
            position: absolute;
            right: -20%;
            font-size: 4.5vh;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 5px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2;
            animation: slideName 10s linear forwards;
            text-transform: uppercase;
        }

        @keyframes slideName {
            from {
                right: -20%;
            }

            to {
                right: 100%;
            }
        }

        .flag-particle {
            position: absolute;
            z-index: 30;
            pointer-events: none;
            font-size: 30px;
            animation: particlePop 0.8s ease-out forwards;
        }

        @keyframes particlePop {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translate(calc(var(--tx)*0.5), calc(var(--ty)*0.5)) scale(1.5);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        @keyframes lavaPulse {
            0% {
                box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.8), 0 0 30px 10px rgba(255, 165, 0, 0.6);
                border-color: #ff0000;
            }

            50% {
                box-shadow: 0 0 25px 10px rgba(255, 140, 0, 0.9), 0 0 50px 20px rgba(255, 255, 0, 0.7);
                border-color: #ffff00;
            }

            100% {
                box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.8), 0 0 30px 10px rgba(255, 165, 0, 0.6);
                border-color: #ff0000;
            }
        }

        .leader-flag .start-line img.flag-img {
            border-color: transparent !important;
            animation: lavaPulse 1s infinite alternate;
        }

        /* NUEVOS ESTILOS */
        .aviso-pais {
            color: yellow;
            font-size: 1.4vh;
            font-weight: 900;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 50px;
            animation: slideUp 0.5s forwards;
            pointer-events: none;
        }

        .aviso-pais.fade-out {
            opacity: 0;
            transition: opacity 1s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .custom-timer {
            position: absolute;
            color: white;
            font-size: 6vh;
            font-weight: 900;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 40;
            cursor: move;
            user-select: none;
        }

        /* PODIO */
        .podio-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            animation: fadeIn 0.5s;
        }

        .podio-flex {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            height: 300px;
            margin-top: 20px;
        }

        .podio-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            animation: slideUpPodio 1s ease-out forwards;
            opacity: 0;
        }

        .podio-col.p2 {
            animation-delay: 0.6s;
        }

        .podio-col.p1 {
            animation-delay: 1.2s;
        }

        .podio-col.p3 {
            animation-delay: 0s;
        }

        @keyframes slideUpPodio {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.is-fullscreen .inputFields {
            display: none !important;
        }

        body.is-fullscreen #camSettingsPanel {
            display: none !important;
        }

        body.is-fullscreen #exitFullscreenBtn {
            display: block !important;
        }

        .mobile-selected {
            outline: 3px dashed #00FF00 !important;
            background: rgba(0, 255, 0, 0.2) !important;
            z-index: 9999 !important;
            border-radius: 10px;
        }

        .draggable-item {
            cursor: move;
        }

        /* MVP Y FUEGOS ARTIFICIALES */
        .mvp-rain-item {
            position: absolute;
            color: #FFD700;
            font-size: 3vh;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, 0 0 10px #FFD700;
            animation: fallRain 4s linear forwards;
            pointer-events: none;
            z-index: 200;
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
            animation: explode 1s ease-out forwards;
        }

        @keyframes fallRain {
            0% {
                transform: translateY(-50px);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(15);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // CONEXIÓN (TikFinity local WebSocket)
        class TikFinityConnection {
            constructor(wsUrl) {
                this.wsUrl = wsUrl;
                this.ws = null;
                this.handlers = {};
                this.uniqueId = null;
            }

            on(eventName, eventHandler) {
                if (!this.handlers[eventName]) this.handlers[eventName] = [];
                this.handlers[eventName].push(eventHandler);
            }

            emitLocal(eventName, payload) {
                const list = this.handlers[eventName] || [];
                list.forEach(fn => {
                    try { fn(payload); } catch (e) { console.error(e); }
                });
            }

            connect(uniqueId) {
                this.uniqueId = uniqueId;

                return new Promise((resolve, reject) => {
                    try {
                        this.ws = new WebSocket(this.wsUrl);
                    } catch (err) {
                        reject("No se pudo abrir WebSocket de TikFinity.");
                        return;
                    }

                    const timeout = setTimeout(() => {
                        reject("Timeout conectando a TikFinity.");
                    }, 15000);

                    this.ws.onopen = () => {
                        // TikFinity suele estar ya conectado desde la app desktop.
                        // Enviamos mensajes de conexión opcionales por compatibilidad.
                        const connectMsgs = [
                            { action: "connect", uniqueId: uniqueId },
                            { event: "setUniqueId", uniqueId: uniqueId },
                            { type: "setUniqueId", uniqueId: uniqueId }
                        ];
                        connectMsgs.forEach(msg => {
                            try { this.ws.send(JSON.stringify(msg)); } catch (_) { }
                        });

                        clearTimeout(timeout);
                        resolve({ roomId: uniqueId || "tikfinity-local" });
                    };

                    this.ws.onerror = () => {
                        clearTimeout(timeout);
                        reject("Error de conexión con TikFinity. Verifica que la app esté abierta.");
                    };

                    this.ws.onmessage = (evt) => {
                        let msg;
                        try {
                            msg = JSON.parse(evt.data);
                        } catch (_) {
                            return;
                        }

                        const eventName = (msg.event || msg.type || msg.eventType || "").toString().toLowerCase();
                        const data = msg.data || msg.payload || msg;
                        const normalized = this.normalizeEvent(eventName, data);
                        if (!normalized) return;
                        this.emitLocal(normalized.name, normalized.data);
                    };

                    this.ws.onclose = () => {
                        this.emitLocal("streamEnd", {});
                    };
                });
            }

            normalizeEvent(eventName, data) {
                const uniqueId = data.uniqueId || data.username || data.user || data.userName || "";
                const nickname = data.nickname || data.nickName || uniqueId || "Usuario";
                const profilePictureUrl = data.profilePictureUrl || data.profilePic || data.avatar || "";

                if (eventName.includes("chat") || eventName.includes("comment")) {
                    return {
                        name: "chat",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            comment: data.comment || data.message || data.text || ""
                        }
                    };
                }

                if (eventName.includes("gift")) {
                    return {
                        name: "gift",
                        data: {
                            uniqueId,
                            nickname,
                            profilePictureUrl,
                            giftId: Number(data.giftId ?? data.gift_id ?? data.id ?? 0),
                            repeatCount: Number(data.repeatCount ?? data.repeat_count ?? data.count ?? 1),
                            repeatEnd: Boolean(data.repeatEnd ?? data.repeat_end ?? false)
                        }
                    };
                }

                if (eventName.includes("like")) {
                    return {
                        name: "like",
                        data: {
                            uniqueId,
                            likeCount: Number(data.likeCount ?? data.count ?? data.likes ?? 1)
                        }
                    };
                }

                if (eventName.includes("follow")) {
                    return { name: "follow", data: { uniqueId } };
                }

                if (eventName.includes("share")) {
                    return { name: "share", data: { uniqueId } };
                }

                return null;
            }
        }

        let connection = new TikTokIOConnection("https://tiktok-chat-reader-nh9k.onrender.com");

                let ch = $('#zona').height();
                $('#videoElement').css({

                    top: (ch - cw) / 2 + 'px',
                    transform: `rotate(${rot}deg) scaleX(${scaleX})`
                });
            } else {
                $('#videoElement').css({

                    height: '100%',
                    left: '0',
                    top: '0',
                    transform: `rotate(${rot}deg) scaleX(${scaleX})`

            connection.on("chat", data => {
                // createComment(data.nickname, data.profilePictureUrl, data.comment);

                const text = data.comment.toLowerCase();
                for (const [name, code] of Object.entries(countryMap)) {
                    if (text.includes(name)) {

            // DETECCIÓN DE REGALOS (manejo robusto de ráfagas/progresivo)
            const giftPoints = {
                5655: 1, 7096: 1, 15231: 1, 15232: 1, 5269: 1, 7032: 1, 15933: 1, 5827: 1, 8239: 1,
                5487: 7,
                7934: 20, 5658: 20,
                14488: 32, 5879: 30,
                5582: 120, 12988: 120, 5660: 120, 6427: 100, 7569: 120,
                11046: 1200
            };
            const giftProgress = {};

            const giftToTeam = {
                5655: 'colombia',
                5269: 'guatemala',
                19438: 'mexico',
                6064: 'salvador',
                15232: 'chile',
                6788: 'nicaragua',
                19441: 'cuba',
                19439: 'dominicana',
                6784: 'ecuador',
                15231: 'venezuela',
                15104: 'bolivia',
                8239: 'costarica',
                7096: 'honduras',
                7032: 'panama',
                5827: 'uruguay',
                19446: 'argentina',
                13651: 'peru',
                58485: 'paraguay'
            };

            connection.on("gift", data => {
                const giftId = Number(data.giftId);
                const repeatCountRaw = Number(data.repeatCount);
                const repeatCount = Number.isFinite(repeatCountRaw) && repeatCountRaw > 0 ? repeatCountRaw : 1;
                const key = `${data.uniqueId}:${giftId}`;
                const previous = giftProgress[key] || 0;
                const deltaCount = Math.max(0, repeatCount - previous);

                if (deltaCount > 0) {
                    giftProgress[key] = repeatCount;
                }

                try {
                    let isSpecificGift = false;

                    // Verificar si es un regalo específico para un equipo
                    if (giftToTeam[giftId]) {
                        const teamCode = giftToTeam[giftId];
                        if (userCountries[data.uniqueId] !== teamCode) {
                            userCountries[data.uniqueId] = teamCode;
                            const countryName = Object.keys(countryMap).find(k => countryMap[k] === teamCode) || teamCode;
                            // mostrarAvisoPais(data.nickname, countryName);
                        }

                        if (deltaCount > 0) {
                            addPointToFlag(teamCode, deltaCount); // 1 punto por cada unidad de este regalo
                        }
                        isSpecificGift = true;
                    }

                    if (isSpecificGift) return; // Si era regalo específico, ya sumó a su equipo

                    // Regalos especiales
                    if (giftId === 7168 && deltaCount > 0) {
                        const myCode = userCountries[data.uniqueId];
                        if (myCode) {
                            $(".flag-item").each(function () {
                                const code = $(this).attr("data-code");
                                if (code !== myCode) {

                                }

                        }
                        return;
                    }

                    if (giftId === 6646 && deltaCount > 0) {
                        showFireworksMVP(data.nickname);
                        return;
                    }

                    if (giftId === 7934 && deltaCount > 0) {
                        showQuieremeRain(deltaCount);
                    }

                    // Fallback para equipos (requiere estar en un club)
                    const code = userCountries[data.uniqueId];
                    if (!code) return;

                    const pointsPerGift = giftPoints[giftId];
                    if (!pointsPerGift) return;

                    if (deltaCount > 0) {
                        addPointToFlag(code, deltaCount * pointsPerGift);

                        if (giftId === 5879 || pointsPerGift === 120) {
                            new Audio('point.mp3').play().catch(e => console.log("Audio error:", e));
                        } else if (pointsPerGift > 30) {
                            new Audio('turbo.mp3').play().catch(e => console.log("Audio error:", e));
                        }
                    }
                } finally {
                    // Cuando la plataforma marca fin de ráfaga, reiniciamos estado para próxima ráfaga.
                    if (data.repeatEnd) {
                        delete giftProgress[key];
                    }
                }
            });

            let userLikes = {};
            connection.on('like', data => {
                const code = userCountries[data.uniqueId];
                if (!code) return;

                let previousLikes = userLikes[data.uniqueId] || 0;
                let newLikes = previousLikes + data.likeCount;

                if (newPoints > 0) {
                    addPointToFlag(code, newPoints);
                }
                userLikes[data.uniqueId] = newLikes;
            });

            connection.on('follow', data => {

            const $flag = $(`#flag-${code}`);

            horseGifts[code] = (horseGifts[code] || 0) + amount;

            const $counter = $flag.find(".counter");

            updateRacePositions();
            checkLeader();

        function updateRacePositions() {
            // Ordenar por puntos (títulos)
            let sortedFlags = [...allFlags].sort((a, b) => {
                let ptsA = horseGifts[a] || 0;
                let ptsB = horseGifts[b] || 0;
                if (ptsA === ptsB) {
                    return allFlags.indexOf(a) - allFlags.indexOf(b);
                }
                return ptsB - ptsA;
            });

            $(".track").each(function () {
                let code = $(this).attr("data-code");
                let gifts = horseGifts[code] || 0;
                let steps = gifts % 20;
                let percentage = (steps / 20) * 85;
                $(this).find(".horse-wrapper").css("left", (10 + percentage) + "%");
                
                // Aplicar el nuevo orden visual
                let orderIndex = sortedFlags.indexOf(code);
                $(this).css('order', orderIndex);
            });
        }

        function checkLeader() {
            let max = 0;

            $(".flag-item").each(function () {
                const code = $(this).attr("data-code");
                const pts = horseGifts[code] || 0;
                if (pts > max) {
                    max = pts;
                    leaderFlags = [this];
                } else if (pts === max && max > 0) {
                    leaderFlags.push(this);
                }
            });

            $(".flag-item").removeClass("leader-flag");
            if (max > 0) {
                $(leaderFlags).addClass("leader-flag");
            }
        }

        // ==== LÓGICA DE OVERLAY Y OBS ====
        $("#generateOverlayBtn").click(() => {
            let user = $("#uniqueIdInput").val().trim().replace("@", "");
            if (!user) {
                alert("Primero escribe tu @usuario para generar el enlace automático.");
                return;
            }
            let currentPath = window.location.href.split('?')[0];
            currentPath = currentPath.replace("localhost", "127.0.0.1");
            let overlayUrl = `${currentPath}?user=${user}&overlay=1&obs=.com`;

            // Abre en una nueva ventana/pestaña como TikTok Chat Reader
            window.open(overlayUrl, "_blank");
        });

        // Auto-conectar y Modo Transparente (si viene por URL)
        $(document).ready(() => {
            iniciarTemporizadorGlobal(); // Iniciar contador automáticamente

            const urlParams = new URLSearchParams(window.location.search);
            const isOverlay = urlParams.get('overlay');
            const autoUser = urlParams.get('user');

            if (isOverlay) {
                // Modo Overlay: oculta video y quita fondos, pero MANTIENE los controles
                $("body").css("background", "transparent");
                $("#zona").css("background", "transparent");
                $("#videoElement").hide();
                $("#exitFullscreenBtn").hide();
            }

            // Conexión automática para el enlace de OBS/Live Studio
            if (autoUser) {
                $("#uniqueIdInput").val(autoUser);
                setTimeout(connect, 1500);
            }
        });

        // HACK DEFINITIVO: Mantener activa la pestaña usando un Audio HTML5 y override de rAF
        (function () {
            // 1. Sobreescribir requestAnimationFrame para que las animaciones de jQuery/CSS no se pausen
            // al minimizar, ya que rAF nativo se detiene por completo.
            window.requestAnimationFrame = function (callback) {
                return window.setTimeout(function () {
                    callback(performance.now());
                }, 1000 / 60);
            };
            window.cancelAnimationFrame = function (id) {
                window.clearTimeout(id);
            };

            // 2. Elemento de audio HTML5 reproduciendo en bucle infinito
            // Esto evita que el navegador ralentice los setTimeouts cuando la pestaña no está visible
            const silentAudio = new Audio("data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq");
            silentAudio.loop = true;
            silentAudio.volume = 0.01;

            function playSilentAudio() {
                silentAudio.play().catch(e => console.log("Esperando interacción para audio de fondo..."));
                document.removeEventListener('click', playSilentAudio);
                document.removeEventListener('touchstart', playSilentAudio);
            }

            document.addEventListener('click', playSilentAudio);
            document.addEventListener('touchstart', playSilentAudio);
        })();

        // TECLAS DE PRUEBA
        document.addEventListener("keydown", e => {
            if (e.key === "w" || e.key === "W") {
                if (globalTimerInterval) clearInterval(globalTimerInterval);
                $("#globalAutoTimer").text("00:00");
                mostrarPodio();
            }
            if (e.key >= "1" && e.key <= "9") {
                const idx = parseInt(e.key) - 1;
                if (allFlags[idx]) {
                    addPointToFlag(allFlags[idx], 1);
                }
            }
        });
    </script>
